name: Question
description: Ask for help with setup, usage, or how something works.
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're happy to help. Please check the README and docs first.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What do you need help with?
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      description: What area does this relate to?
      options:
        - Installation / setup
        - Agent behavior
        - Vault structure
        - MCP / Gmail / Calendar integration
        - Plugin mode
        - Other
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What I've tried
      description: Any steps you've already taken to find the answer?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any relevant details (OS, vault setup, error messages, etc.)
